<div class="map-wrapper position-relative">

  <!-- Requesting overlay -->
  <div *ngIf="locationState().status === 'requesting'"
       class="map-overlay d-flex flex-column align-items-center justify-content-center gap-2 text-white">
    <div class="spinner-border" role="status" aria-hidden="true"></div>
    <span>Acquiring your location…</span>
  </div>

  <!-- Error overlay -->
  <div *ngIf="locationState().status === 'error'"
       class="map-overlay d-flex flex-column align-items-center justify-content-center gap-3">
    <div class="alert alert-danger text-center mb-0" style="max-width: 360px;">
      <strong>Location unavailable</strong><br />
      <span class="small">{{ $any(locationState()).message }}</span>
    </div>
  </div>

  <!-- Map container -->
  <div #mapContainer class="map-container"></div>

  <!-- Crosshair overlay — always centered, pointer-events: none so map stays interactive -->
  <div class="crosshair" aria-hidden="true">
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
  </div>

  <!-- Floating Save Gym button (visible once map is centred and spreadsheet is ready) -->
  <button
    *ngIf="mapCenter() !== null && spreadsheetReady() && !showSavePanel()"
    class="btn btn-success save-gym-btn"
    (click)="openSavePanel()"
  >
    💾 Save Gym
  </button>

  <!-- Center-to-location button (visible whenever GPS location is available) -->
  <button
    *ngIf="locationState().status === 'located'"
    class="btn btn-light center-location-btn"
    title="Center map on my location"
    (click)="centerToCurrentLocation()"
    aria-label="Center map on my location"
  >
    📍
  </button>

  <!-- Success toast -->
  <div *ngIf="saveSuccess()" class="save-success-badge">✅ Gym saved!</div>

  <!-- Save Gym panel -->
  <div *ngIf="showSavePanel()" class="save-panel card shadow">
    <div class="card-body">
      <h6 class="card-title mb-3">💾 Save Gym at Map Center</h6>

      <div *ngIf="saveError()" class="alert alert-danger py-2 small mb-2">{{ saveError() }}</div>

      <div class="mb-2">
        <label class="form-label small fw-semibold">Gym name <span class="text-danger">*</span></label>
        <input
          type="text"
          class="form-control form-control-sm"
          [ngModel]="gymName()"
          (ngModelChange)="gymName.set($event)"
          placeholder="e.g. Pokéstop Park"
          [disabled]="saving()"
        />
      </div>

      <div class="form-check mb-2">
        <input
          class="form-check-input"
          type="checkbox"
          id="defendedCheck"
          [ngModel]="defended()"
          (ngModelChange)="defended.set($event)"
          [disabled]="saving()"
        />
        <label class="form-check-label small" for="defendedCheck">Currently defended</label>
      </div>

      <div *ngIf="defended()" class="mb-2">
        <label class="form-label small fw-semibold">Defender Pokémon</label>
        <input
          type="text"
          class="form-control form-control-sm"
          [ngModel]="defenderPokemon()"
          (ngModelChange)="defenderPokemon.set($event)"
          placeholder="e.g. Blissey"
          [disabled]="saving()"
        />
      </div>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-success btn-sm" (click)="saveGym()" [disabled]="saving()">
          <span *ngIf="saving()" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
          Save
        </button>
        <button class="btn btn-outline-secondary btn-sm" (click)="cancelSave()" [disabled]="saving()">Cancel</button>
      </div>
    </div>
  </div>

</div>
