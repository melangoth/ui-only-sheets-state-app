# Google OAuth client ID (same value used by the frontend)
app.google.client-id=${GOOGLE_CLIENT_ID}

# Secret key for signing app JWTs (at least 32 bytes); inject via environment variable or Secret Manager
app.jwt.signing-key=${JWT_SIGNING_KEY}

# App token lifetime in seconds (default: 3600 = 1 hour)
app.jwt.ttl-seconds=3600

# Comma-separated list of allowed frontend origins for CORS
# Example production value: https://your-app.web.app
app.cors.allowed-origins=http://localhost:4200

# Expose only the health endpoint for Cloud Run probes; keep all others private
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Server port (Cloud Run injects PORT at runtime)
server.port=${PORT:8080}
