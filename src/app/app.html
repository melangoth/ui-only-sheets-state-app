<div class="min-vh-100 bg-dark">
  <!-- Header -->
  <nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand fw-bold">🎨 Color Toggle App</span>
    <div *ngIf="auth.isSignedIn()" class="d-flex align-items-center gap-3">
      <span class="text-white small">{{ auth.user()?.email }}</span>
      <button *ngIf="enableClearCredentialsButton" class="btn btn-sm btn-warning" (click)="clearCredentials()" title="Clear all stored credentials and sign out">
        Clear Credentials
      </button>
      <button class="btn btn-sm btn-outline-light" (click)="auth.signOut()">Sign out</button>
    </div>
    <div *ngIf="!auth.isSignedIn() && enableClearCredentialsButton" class="d-flex align-items-center">
      <button class="btn btn-sm btn-warning" (click)="clearCredentials()" title="Clear all stored credentials">
        Clear Credentials
      </button>
    </div>
  </nav>

  <!-- Nav tabs (always visible) -->
  <div class="bg-dark border-bottom border-secondary px-3">
    <ul class="nav nav-tabs border-0">
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/buttons" routerLinkActive="active">🎨 Buttons</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/map" routerLinkActive="active">🗺️ Map</a>
      </li>
    </ul>
  </div>

  <!-- Routed content -->
  <main class="container py-4">
    <router-outlet></router-outlet>
  </main>
</div>
