<!-- Not signed in -->
<div *ngIf="!auth.isSignedIn()" class="row justify-content-center">
  <div class="col-md-6 text-center">
    <h1 class="h3 mb-2">Color Toggle App</h1>
    <p class="text-muted mb-4">
      Sign in with your Google account to manage your color button states.<br>
      Your state is saved to a Google Sheet in your own Google Drive.
    </p>

    <div *ngIf="auth.authError()" class="alert alert-danger mb-3">
      {{ auth.authError() }}
    </div>

    <div id="google-sign-in-button" class="d-flex justify-content-center mb-3"></div>
  </div>
</div>

<!-- Signed in -->
<div *ngIf="auth.isSignedIn()">
  <div class="mb-4">
    <h2 class="h4 mb-0">Your Color Buttons</h2>
    <p class="text-muted small mb-0">
      Click a button to toggle between Passive and Active. State is saved to your Google Drive.
    </p>
  </div>
  <app-button-board></app-button-board>
</div>
